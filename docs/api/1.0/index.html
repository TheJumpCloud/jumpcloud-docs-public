<script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js" crossorigin="anonymous"></script>
<script>
  (function () {
    const STORAGE_KEY = "jumpcloudDocsRegion";
    const REGION_SERVER_KEY = "x-jc-region";
    const REGION_SWITCHER = {"default_label": "United States", "default_region": "us", "regions": [{"host": "console.jumpcloud.com", "key": "us", "label": "United States"}, {"host": "console.eu.jumpcloud.com", "key": "eu", "label": "EU"}, {"host": "console.in.jumpcloud.com", "key": "in", "label": "India"}]};
    const SPEC_URL = "index.yaml";

    const REGIONS = Array.isArray(REGION_SWITCHER.regions) ? REGION_SWITCHER.regions : [];
    const REGION_KEYS = REGIONS.map(function (region) { return region.key; });
    const HOST_BY_REGION = Object.fromEntries(REGIONS.map(function (region) { return [region.key, region.host]; }));
    const LABEL_BY_REGION = Object.fromEntries(REGIONS.map(function (region) { return [region.key, region.label]; }));
    const HOST_ALIASES = REGIONS.map(function (region) { return String(region.host || "").toLowerCase(); }).filter(Boolean);

    let jcMountGeneration = 0;

    function jcNormalizeRegionHostStrings(value, targetHost) {
      if (typeof value !== "string") return value;
      let replaced = value;
      for (const host of HOST_ALIASES) {
        if (host !== targetHost) {
          replaced = replaced.split(host).join(targetHost);
        }
      }
      return replaced;
    }

    function jcWalkMutateStrings(node, targetHost) {
      if (node === null || typeof node !== "object") {
        return;
      }
      if (Array.isArray(node)) {
        for (let idx = 0; idx < node.length; idx++) {
          if (typeof node[idx] === "string") {
            node[idx] = jcNormalizeRegionHostStrings(node[idx], targetHost);
          } else {
            jcWalkMutateStrings(node[idx], targetHost);
          }
        }
        return;
      }
      for (const key of Object.keys(node)) {
        const value = node[key];
        if (typeof value === "string") {
          node[key] = jcNormalizeRegionHostStrings(value, targetHost);
        } else {
          jcWalkMutateStrings(value, targetHost);
        }
      }
    }

    function jcApplyRegionToSpec(spec, targetHost) {
      const servers = spec.servers;
      delete spec.servers;
      jcWalkMutateStrings(spec, targetHost);
      if (servers) {
        spec.servers = servers;
      }
      if (typeof spec.host === "string") {
        const host = spec.host.toLowerCase();
        if (HOST_ALIASES.indexOf(host) !== -1) {
          spec.host = targetHost;
        }
      }
    }

    function jcReorderServersForRegion(spec, regionKey) {
      if (!spec.servers || !Array.isArray(spec.servers)) {
        return;
      }
      const key = String(regionKey || "").toLowerCase();
      if (!key) {
        return;
      }
      const matchIdx = spec.servers.findIndex((server) => {
        if (!server || typeof server !== "object") {
          return false;
        }
        const serverRegion = String(server[REGION_SERVER_KEY] || "").toLowerCase();
        return serverRegion === key;
      });
      if (matchIdx <= 0) {
        return;
      }
      const selected = spec.servers.splice(matchIdx, 1)[0];
      spec.servers.unshift(selected);
    }

    async function jcLoadSpecFromUrl() {
      const response = await fetch(SPEC_URL);
      if (!response.ok) {
        throw new Error("Spec HTTP " + response.status);
      }
      const text = await response.text();
      const trimmed = text.trim();
      const spec = trimmed.startsWith("{")
        ? JSON.parse(text)
        : window.jsyaml.load(text);
      if (!spec || typeof spec !== "object") {
        throw new Error("Invalid spec payload");
      }
      return spec;
    }

    function jcSavedRegionKey() {
      const configuredDefault = (REGION_SWITCHER.default_region || "").toLowerCase();
      const fallbackDefault = REGION_KEYS.indexOf(configuredDefault) !== -1
        ? configuredDefault
        : (REGION_KEYS[0] || "");
      const value = (localStorage.getItem(STORAGE_KEY) || fallbackDefault).toLowerCase();
      return REGION_KEYS.indexOf(value) !== -1 ? value : fallbackDefault;
    }

    function jcSetSavedRegionKey(key) {
      localStorage.setItem(STORAGE_KEY, key);
    }

    function jcSetRegionLabel(regionKey) {
      const labelEl = document.getElementById("jcRegionLabel");
      if (!labelEl) return;
      labelEl.textContent = LABEL_BY_REGION[regionKey] || LABEL_BY_REGION[REGION_KEYS[0]] || regionKey;
    }

    function jcRestoreDocHash(savedHash) {
      if (!savedHash) {
        return;
      }
      try {
        if (window.location.hash === savedHash) {
          const base = window.location.pathname + window.location.search;
          history.replaceState(null, document.title, base);
        }
        window.location.hash = savedHash;
      } catch (e) {
        console.warn("JumpCloud region switcher: could not restore doc hash", e);
      }
    }

    async function jcMountViewer(regionKey) {
      const targetHost = HOST_BY_REGION[regionKey] || HOST_BY_REGION[REGION_KEYS[0]];
      const mountGeneration = ++jcMountGeneration;
      let spec;
      try {
        spec = await jcLoadSpecFromUrl();
      } catch (error) {
        if (mountGeneration !== jcMountGeneration) {
          return;
        }
        throw error;
      }
      if (mountGeneration !== jcMountGeneration) {
        return;
      }
      jcApplyRegionToSpec(spec, targetHost);
      jcReorderServersForRegion(spec, regionKey);
      const root = document.getElementById("jc-region-spec-viewer-root");
      if (!root) {
        return;
      }

      const docHash = window.location.hash || "";
      root.innerHTML = "";
      const redocEl = document.createElement("redoc");
      root.appendChild(redocEl);
      const opts = window.__JC_REDOC_OPTS || { scrollYOffset: "nav" };
      const restoreTimer = setTimeout(function () {
        if (mountGeneration !== jcMountGeneration) {
          return;
        }
        jcRestoreDocHash(docHash);
      }, 250);
      Redoc.init(spec, opts, redocEl, function (maybeErr) {
        clearTimeout(restoreTimer);
        if (mountGeneration !== jcMountGeneration) {
          return;
        }
        if (maybeErr instanceof Error) {
          console.error("JumpCloud region switcher: Redoc render error", maybeErr);
        }
        jcRestoreDocHash(docHash);
      });
    }

    function jcWireRegionMenu() {
      const menuItems = document.querySelectorAll(".jc-region-item");
      for (let idx = 0; idx < menuItems.length; idx++) {
        menuItems[idx].addEventListener("click", async function (event) {
          event.preventDefault();
          const key = this.getAttribute("data-jc-region");
          if (!key) {
            return;
          }
          jcSetSavedRegionKey(key);
          jcSetRegionLabel(key);
          try {
            await jcMountViewer(key);
          } catch (error) {
            console.error("JumpCloud region switcher: remount failed", error);
          }
        });
      }
    }

    if (!REGION_KEYS.length) {
      return;
    }

    jcWireRegionMenu();
    const initialRegionKey = jcSavedRegionKey();
    jcSetRegionLabel(initialRegionKey);
    void (async function jcBootInitialMount() {
      try {
        await jcMountViewer(initialRegionKey);
      } catch (error) {
        console.error("JumpCloud region switcher: initial mount failed", error);
      }
    })();
  })();
</script>

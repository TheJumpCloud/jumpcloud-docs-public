        - name
        - ssoUrl
      type: object
      properties:
        _id:
          type: string
        active:
          type: boolean
        beta:
          type: boolean
        color:
          type: string
          enum:
            - ''
            - '#202D38'
            - '#005466'
            - '#3E8696'
            - '#006CAC'
            - '#0617AC'
            - '#7C6ADA'
            - '#D5779D'
            - '#9E2F00'
            - '#FFB000'
            - '#58C469'
            - '#57C49F'
            - '#FF6C03'
        config:
          $ref: '#/components/schemas/application_config'
        created:
          type: string
        databaseAttributes:
          type: array
          items:
            type: object
            properties: {}
        description:
          maxLength: 256
          type: string
        displayLabel:
          type: string
        displayName:
          type: string
        learnMore:
          type: string
        logo:
          $ref: '#/components/schemas/application_logo'
        name:
          type: string
        organization:
          type: string
        sso:
          $ref: '#/components/schemas/sso'
        ssoUrl:
          type: string
        parentApp:
          type: string
    applicationslist:
      title: ApplicationsList
      type: object
      properties:
        name:
          type: string
        results:
          type: array
          description: The list of applications.
          items:
            $ref: '#/components/schemas/application'
        totalCount:
          type: integer
          description: The total number of applications.
    applicationtemplate:
      title: ApplicationTemplate
      type: object
      properties:
        _id:
          type: string
        active:
          type: boolean
        beta:
          type: boolean
        status:
          type: string
          enum:
            - ''
            - end_of_life
            - end_of_support
            - beta
        color:
          type: string
          enum:
            - ''
            - '#202D38'
            - '#005466'
            - '#3E8696'
            - '#006CAC'
            - '#0617AC'
            - '#7C6ADA'
            - '#D5779D'
            - '#9E2F00'
            - '#FFB000'
            - '#58C469'
            - '#57C49F'
            - '#FF6C03'
        config:
          $ref: '#/components/schemas/applicationtemplate_config'
        displayLabel:
          type: string
        displayName:
          type: string
        isConfigured:
          type: boolean
        jit:
          $ref: '#/components/schemas/applicationtemplate_jit'
        learnMore:
          type: string
        logo:
          $ref: '#/components/schemas/applicationtemplate_logo'
        name:
          type: string
        oidc:
          $ref: '#/components/schemas/applicationtemplate_oidc'
        provision:
          $ref: '#/components/schemas/applicationtemplate_provision'
        sso:
          $ref: '#/components/schemas/sso'
        ssoUrl:
          type: string
        test:
          type: string
        keywords:
          type: array
          items:
            type: string
    applicationtemplateslist:
      title: ApplicationTemplatesList
      type: object
      properties:
        results:
          type: array
          description: The list of applications.
          items:
            $ref: '#/components/schemas/applicationtemplate'
        totalCount:
          type: integer
          description: The total number of applications.
    command:
      title: Command
      required:
        - command
        - commandType
        - name
      type: object
      properties:
        command:
          type: string
          description: The command to execute on the server.
        commandRunners:
          type: array
          description: An array of IDs of the Command Runner Users that can execute this command.
          items:
            type: string
        commandType:
          type: string
          description: The Command OS
          default: linux
        files:
          type: array
          description: An array of file IDs to include with the command.
          items:
            type: string
        launchType:
          type: string
          description: How the command will execute.
        listensTo:
          type: string
          description: ''
        name:
          type: string
        organization:
          type: string
          description: The ID of the organization.
        schedule:
          type: string
          description: |
            A crontab that consists of: [ (seconds) (minutes) (hours) (days of month) (months) (weekdays) ] or [ immediate ]. If you send this as an empty string, it will run immediately.
        scheduleRepeatType:
          type: string
          description: When the command will repeat.
        sudo:
          type: boolean
          description: ''
        systems:
          type: array
          description: Not used. Use /api/v2/commands/{id}/associations to bind commands to systems.
          items:
            type: string
        template:
          type: string
          description: The template this command was created from
        timeout:
          type: string
          description: The time in seconds to allow the command to run for. The maximum value is 86400 seconds (1 day).
        trigger:
          type: string
          description: The name of the command trigger.
        user:
          type: string
          description: The ID of the system user to run the command as. This field is required when creating a command with a commandType of "mac" or "linux".
        shell:
          type: string
          description: The shell used to run the command.
        timeToLiveSeconds:
          type: integer
          description: Time in seconds a command can wait in the queue to be run before timing out
        scheduleYear:
          type: integer
          description: The year that a scheduled command will launch in.
        filesS3:
          type: array
          description: An array of file stored in S3 to include with the command.
          items:
            $ref: '#/components/schemas/filesS3'
        description:
          type: string
          description: Description of the command.
        aiGenerated:
          type: boolean
          description: Whether this command was generated with AI assistance.
        templatingRequired:
          type: boolean
          description: Whether this command requires templating before execution.
    commandfilereturn:
      title: CommandFileReturn
      type: object
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/commandfilereturn_results'
        totalCount:
          type: integer
          description: The total number of commands files
    commandresult:
      title: CommandResult
      type: object
      properties:
        _id:
          type: string
          description: The ID of the command.
        command:
          type: string
          description: The command that was executed on the system.
        files:
          type: array
          description: An array of file ids that were included in the command
          items:
            type: string
        name:
          type: string
          description: The name of the command.
        organization:
          type: string
          description: The ID of the organization.
        response:
          $ref: '#/components/schemas/commandresult_response'
        sudo:

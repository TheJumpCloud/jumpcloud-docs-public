          examples:
            - Name:
                editable: true
                value: Finance laptop 12
              Model:
                editable: true
                value: MacBookPro18,3
              Serial Number:
                editable: true
                value: C02XK0ZLMN8Q
              Status:
                editable: true
                value:
                  id: 6924631f16a853000117a678
                  name: In stock
                  type: select
              Owner:
                editable: true
                value:
                  id: 605a1f77bcf86cd7994390aa
                  name: Jane Smith
                  type: user
              Location:
                editable: true
                value:
                  id: 605b2f88bcf86cd7994390bb
                  name: London HQ
                  type: location
      examples:
        - id: 507f1f77bcf86cd799439011
          jcSystemId: 605c3f99bcf86cd7994390cc
          fields:
            Name:
              editable: true
              value: Finance laptop 12
            Model:
              editable: true
              value: MacBookPro18,3

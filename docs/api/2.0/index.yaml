paths:
  /activedirectories:
    get:
      description: |-
        This endpoint allows you to list all your Active Directory Instances.

        #### Sample Request
        ```
        curl -X GET https://console.jumpcloud.com/api/v2/activedirectories/ \
          -H 'accept: application/json' \
          -H 'content-type: application/json' \
          -H 'x-api-key: {API_KEY}'
          ```
      operationId: activedirectories_list
      parameters:
        - $ref: '#/components/parameters/trait_fields_fields'
        - $ref: '#/components/parameters/trait_filter_filter'
        - $ref: '#/components/parameters/trait_limit_limit'
        - $ref: '#/components/parameters/trait_skip_skip'
        - $ref: '#/components/parameters/trait_sort_sort'
        - $ref: '#/components/parameters/trait_multiTenantRequestHeaders_x-org-id'
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/active-directory'
                type: array
      security:
        - x-api-key: []
      summary: List Active Directories
      tags:
        - Active Directory
      x-scopes:
        - directories
        - directories.readonly
      x-codeSamples:
        - lang: Shell
          source: |-
            curl --request GET \
              --url 'https://console.jumpcloud.com/api/v2/activedirectories?fields=SOME_ARRAY_VALUE&filter=SOME_ARRAY_VALUE&limit=SOME_INTEGER_VALUE&skip=SOME_INTEGER_VALUE&sort=SOME_ARRAY_VALUE' \
              --header 'x-api-key: REPLACE_KEY_VALUE' \
              --header 'x-org-id: SOME_STRING_VALUE'
        - lang: Python
          source: |-
            import requests

            url = "https://console.jumpcloud.com/api/v2/activedirectories"

            querystring = {"fields":"SOME_ARRAY_VALUE","filter":"SOME_ARRAY_VALUE","limit":"SOME_INTEGER_VALUE","skip":"SOME_INTEGER_VALUE","sort":"SOME_ARRAY_VALUE"}

            headers = {
                "x-org-id": "SOME_STRING_VALUE",
                "x-api-key": "REPLACE_KEY_VALUE"
            }

            response = requests.request("GET", url, headers=headers, params=querystring)

            print(response.text)
        - lang: Powershell
          source: |-
            $headers=@{}
            $headers.Add("x-org-id", "SOME_STRING_VALUE")
            $headers.Add("x-api-key", "REPLACE_KEY_VALUE")
            $response = Invoke-RestMethod -Uri 'https://console.jumpcloud.com/api/v2/activedirectories?fields=SOME_ARRAY_VALUE&filter=SOME_ARRAY_VALUE&limit=SOME_INTEGER_VALUE&skip=SOME_INTEGER_VALUE&sort=SOME_ARRAY_VALUE' -Method GET -Headers $headers
    post:
      description: |-
        This endpoint allows you to create a new Active Directory.


        #### Sample Request
        ```
        curl -X POST https://console.jumpcloud.com/api/v2/activedirectories/ \
          -H 'accept: application/json' \
          -H 'content-type: application/json' \
          -H 'x-api-key: {API_KEY}' \
          -d '{
            "domain": "{DC=AD_domain_name;DC=com}"
          }'
        ```
      operationId: activedirectories_post
      parameters:
        - $ref: '#/components/parameters/trait_multiTenantRequestHeaders_x-org-id'
      requestBody:
        $ref: '#/components/requestBodies/active-directory'
      responses:
        '201':
          description: ''
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/active-directory'
      security:
        - x-api-key: []
      summary: Create a new Active Directory
      tags:
        - Active Directory
      x-scopes:
        - directories
      x-codeSamples:
        - lang: Shell
          source: |-
            curl --request POST \
              --url https://console.jumpcloud.com/api/v2/activedirectories \
              --header 'content-type: application/json' \
              --header 'x-api-key: REPLACE_KEY_VALUE' \
              --header 'x-org-id: SOME_STRING_VALUE' \
              --data '{"domain":"string","useCase":"UNSET","groupsEnabled":true,"delegationState":"ENABLED","updatedAt":"2019-08-24T14:15:22Z"}'
        - lang: Python
          source: |-
            import requests

            url = "https://console.jumpcloud.com/api/v2/activedirectories"

            payload = {
                "domain": "string",
                "useCase": "UNSET",
                "groupsEnabled": True,
                "delegationState": "ENABLED",
                "updatedAt": "2019-08-24T14:15:22Z"
            }
            headers = {
                "x-org-id": "SOME_STRING_VALUE",
                "x-api-key": "REPLACE_KEY_VALUE",
                "content-type": "application/json"
            }

            response = requests.request("POST", url, json=payload, headers=headers)

            print(response.text)
        - lang: Powershell
          source: |-
            $headers=@{}
            $headers.Add("x-org-id", "SOME_STRING_VALUE")
            $headers.Add("x-api-key", "REPLACE_KEY_VALUE")
            $headers.Add("content-type", "application/json")
            $response = Invoke-RestMethod -Uri 'https://console.jumpcloud.com/api/v2/activedirectories' -Method POST -Headers $headers -ContentType 'application/json' -Body '{"domain":"string","useCase":"UNSET","groupsEnabled":true,"delegationState":"ENABLED","updatedAt":"2019-08-24T14:15:22Z"}'
    parameters: []
    x-functionalities-tags:
      - active-directory

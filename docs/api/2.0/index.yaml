              --header 'x-api-key: REPLACE_KEY_VALUE' \
              --header 'x-org-id: SOME_STRING_VALUE' \
              --data '{"insertTranslationRules":[{"appliedOn":["CREATE"],"destination":"string","direction":"UNSPECIFIED","source":"string","sourceType":"PATH"}],"updateTranslationRules":[{"objectId":"string","source":"string","destination":"string","direction":"UNSPECIFIED","sourceType":"PATH","appliedOn":["CREATE"]}],"deleteTranslationRuleObjectIds":["string"]}'

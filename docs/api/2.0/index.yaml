definitions:
  User:
    title: User
    type: object
    properties:
      addresses:
        type: array
        items:
          $ref: '#/definitions/Address'
      alternateEmail:
        type: string
      company:
        maxLength: 1024
        type: string
      costCenter:
        maxLength: 1024
        type: string
      department:
        maxLength: 1024
        type: string
      email:
        maxLength: 1024
        type: string
      employeeIdentifier:
        description: Must be unique per user.
        maxLength: 256
        type: string
      employeeType:
        maxLength: 1024
        type: string
      firstname:
        maxLength: 1024
        type: string
      jobTitle:
        maxLength: 1024
        type: string
      lastname:
        maxLength: 1024
        type: string
      location:
        maxLength: 1024
        type: string
      phoneNumbers:
        type: array
        items:
          $ref: '#/definitions/PhoneNumber'
  Administrator:
    example:
      email: joe@example.com
      enableMultiFactor: true
      firstname: Joe
      id: 0123456789abcdef01234567
      lastname: Blough
      registered: false
    properties:
      apiKeyAllowed:
        type: boolean
      apiKeyHash:
        type: object
        additionalProperties: false
        properties:
          createdAt:
            type: string
            format: date-time
          expireAt:
            type: string
            format: date-time
          prefix:
            type: string
      apiKeySet:
        type: boolean
      email:
        type: string
      enableMultiFactor:
        type: boolean
      firstname:
        type: string
      id:
        type: string
      lastname:
        type: string
      registered:
        type: boolean
      role:
        type: string
      roleName:
        type: string
      roles:
        type: array
        items:
          type: string
      roleNames:
        type: array
        items:
          type: string
      suspended:
        type: boolean
      organizationAccessTotal:

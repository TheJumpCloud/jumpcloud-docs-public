    get:
      summary: List Scope Groups
      tags:
        - Scope Groups
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalCount:
                    type: integer
                    description: Total count of scope groups matching the filter criteria
                  results:

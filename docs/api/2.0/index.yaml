                "appliedOn": [
                  "UPDATE"
                ]
              }
            ],
            "deleteTranslationRuleObjectIds": [
              "{RULE_ID_BASE64_2}",
              "{RULE_ID_BASE64_3}"
            ]
          }'
        ```

          readOnly: true
        description:
          type: string
        detectPreExistingAnamolies:
          type: boolean
          description: |2-
              Toggle to specify whether the alert should be produced for
              already existing anomalies when the rule is created
              or
              the rule applies to future violations.
        eventFilters:
          type: array

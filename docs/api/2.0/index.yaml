  /sample-data:
    post:
      summary: This endpoint creates sample data for trial organizations as part of the Sample data Opt-In functionality.
      tags:
        - Sample Data
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Response message describing the outcome.
                    examples:
                      - Sample data created successfully.
                  results:
                    type: object
                    description: Detailed results of the sample data creation operation.
                    properties:
                      created:
                        type: array
                        description: List of successfully created resources.
                        items:
                          type: object
                          properties:
                            resourceType:
                              type: string
                              description: The type of resource that was created.
                            count:
                              type: integer
                              description: Number of resources created.
                      skipped:
                        type: array
                        description: List of resources that were skipped (e.g., already exist).
                        items:
                          type: object
                          properties:
                            resourceType:
                              type: string
                              description: The type of resource that was skipped.
                            reason:
                              type: string
                              description: Reason why the resource was skipped.
                      failed:
                        type: array
                        description: List of resources that failed to create.
                        items:
                          type: object
                          properties:
                            resourceType:
                              type: string
                              description: The type of resource that failed.
                            error:
                              type: string
                              description: Error message describing the failure.
        '403':
          description: Forbidden - Feature flag is disabled
          content:
            application/json:
              schema:
                type: object
        '422':
          description: Unprocessable Entity - One or more resources failed to create
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    description: Error message.
                    examples:
                      - Some sample data resources failed to create.
                  results:
                    type: object
                    description: Detailed results including failures.
                    properties:
                      created:
                        type: array
                        description: List of successfully created resources.
                        items:
                          type: object
                          properties:
                            resourceType:
                              type: string
                            count:
                              type: integer
                      skipped:
                        type: array
                        description: List of resources that were skipped.
                        items:
                          type: object
                          properties:
                            resourceType:
                              type: string
                            reason:
                              type: string
                      failed:
                        type: array
                        description: List of resources that failed to create.
                        items:
                          type: object
                          properties:
                            resourceType:
                              type: string
                            error:
                              type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - resourceTypes
              properties:
                resourceTypes:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    enum:
                      - users
                      - usergroups
                  description: Array of resource types to create. Each resource type is processed independently.
                  examples:
                    -   - users
                        - usergroups
        required: true
      operationId: sampleData_post
      description: |
        This endpoint creates sample data for the organization based on the requested resource types.

        Supported resource types:
        - `users`: Creates 6 sample users (2 activated, 2 staged, 2 suspended) with varying attributes
        - `usergroups`: Creates a dynamic user group that automatically includes users in the Sales department

        Each resource type is processed independently. If one fails, others may still succeed.
        The response includes detailed results showing what was created, skipped, or failed.
      security:
        - x-api-key: []
      x-scopes:
        - users
        - groups
      x-codeSamples:
        - lang: Shell
          source: |-
            curl --request POST \
              --url https://console.jumpcloud.com/api/v2/sample-data \
              --header 'content-type: application/json' \
              --header 'x-api-key: REPLACE_KEY_VALUE' \
              --data '{"resourceTypes":["users","usergroups"]}'
        - lang: Python
          source: |-
            import requests

            url = "https://console.jumpcloud.com/api/v2/sample-data"

            payload = {"resourceTypes": ["users", "usergroups"]}
            headers = {
                "x-api-key": "REPLACE_KEY_VALUE",
                "content-type": "application/json"
            }

            response = requests.request("POST", url, json=payload, headers=headers)

            print(response.text)
        - lang: Powershell
          source: |-
            $headers=@{}
            $headers.Add("x-api-key", "REPLACE_KEY_VALUE")
            $headers.Add("content-type", "application/json")
            $response = Invoke-RestMethod -Uri 'https://console.jumpcloud.com/api/v2/sample-data' -Method POST -Headers $headers -ContentType 'application/json' -Body '{"resourceTypes":["users","usergroups"]}'
    x-functionalities-tags:
      - sample-data

      - softwareUpdate
      - unlockWithWatch
      - updateComplete
      - wallpaper
      - watchMigration
      - welcome
      - additionalPrivacySettings
      - multitasking
      - osShowcase
      - webContentFiltering
      - safetyAndHandling

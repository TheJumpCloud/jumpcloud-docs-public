  /feature-settings:
    get:
      summary: Get Organization Feature Settings
      description: |-
        Get organization feature settings using filters. Returns a list of features with their settings grouped by feature name.

        #### Sample Request
        ```
        curl -X GET 'https://console.jumpcloud.com/api/v2/feature-settings?filter=feature.name:eq:mcp&filter=setting.name:eq:enabled' \
          -H 'Accept: application/json' \
          -H 'Content-Type: application/json' \
          -H 'x-api-key:{API_KEY}'
        ```

        #### Sample Response
        ```json
        {
          "features": [
            {
              "name": "mcp",
              "settings": [
                {
                  "name": "enabled",
                  "value": true
                },
                {
                  "name": "threshold",
                  "value": 10
                }
              ],
              "category": "ai"
            }
          ]
        }
        ```
      operationId: OrganizationFeatureSettingsService_List
      responses:
        '200':
          description: Success retrieving Organization Feature Settings.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/jumpcloud.organization_settings.ListFeatureSettingsResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorDetails'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      parameters:
        - name: filter
          description: "A filter to apply to the query.\n\n\t**Filter structure**: `<field>:<operator>:<value>`.\n\n\t**field** = Populate with a valid field from an endpoint response.\n\n\t**operator** =  Supported operators are: eq, ne, gt, ge, lt, le, search, in.\n\n\t**value** = Populate with the value you want to search for. Is case sensitive. Supports wild cards.\n\n\t**Example** `GET /api/v2/feature-settings?filter=feature.name:eq:mcp&filter=setting.name:eq:enabled`\n"
          in: query
          required: false
          explode: true
          schema:
            type: array
            items:
              type: string
          allowReserved: true

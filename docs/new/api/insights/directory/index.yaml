  title: Directory Insights API
  contact:
    url: https://jumpcloud.com/support/contact-jumpcloud-support
  version: "1.0"
servers:
  - url: https://api.jumpcloud.com/insights/directory
    description: United States (US)
    x-jc-region: us
  - url: https://api.eu.jumpcloud.com/insights/directory
    description: European Union (EU)
    x-jc-region: eu
  - url: https://api.in.jumpcloud.com/insights/directory
    description: India (IN)
    x-jc-region: in
paths:
  /v1/events:
    post:
      security:
        - x-api-key: []
          x-org-id: []
      description: |-
        Query the API for Directory Insights events
        #### Sample Request
        ```
        curl -X POST 'https://api.jumpcloud.com/insights/directory/v1/events' -H 'Content-Type: application/json' -H 'x-api-key: REPLACE_KEY_VALUE' --data '{"service": ["all"], "start_time": "2021-07-14T23:00:00Z", "end_time": "2021-07-28T14:00:00Z", "sort": "DESC", "fields": ["timestamp", "event_type", "initiated_by", "success", "client_ip", "provider", "organization"]}'
        ```
      tags:
        - EventQuery
      summary: Query Events
      operationId: postInsightsDirectoryV1Events
      requestBody:
        $ref: "#/components/requestBodies/EventQuery"
      responses:
        "200":
          description: Array of Directory Insights events JSON objects
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  additionalProperties: true
        "400":
          description: Invalid/unknown query JSON body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "401":
          description: Unauthorized (Invalid API Key)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "402":
          description: Directory Insights is not enabled for your organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "500":
          description: Technical difficulties processing your request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
      x-scopes:
        - directoryinsights.readonly
  /v1/events/count:
    post:
      security:
        - x-api-key: []
          x-org-id: []
      description: |-
        Query the API for a count of matching events
        #### Sample Request
        ```
        curl -X POST 'https://api.jumpcloud.com/insights/directory/v1/events/count' -H 'Content-Type: application/json' -H 'x-api-key: REPLACE_KEY_VALUE' --data '{"service": ["all"], "start_time": "2021-07-14T23:00:00Z", "end_time": "2021-07-28T14:00:00Z", "sort": "DESC", "fields": ["timestamp", "event_type", "initiated_by", "success", "client_ip", "provider", "organization"]}'
        ```
      tags:
        - EventQuery
      summary: Count Events
      operationId: postInsightsDirectoryV1EventsCount
      requestBody:
        $ref: "#/components/requestBodies/EventQuery"
      responses:
        "200":
          description: Count of matching event rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventCount"
        "400":
          description: Invalid/unknown query JSON body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "401":
          description: Unauthorized (Invalid API Key)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "402":
          description: Directory Insights is not enabled for your organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "500":
          description: Technical difficulties processing your request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
      x-scopes:
        - directoryinsights.readonly
  /v1/events/distinct:
    post:
      security:
        - x-api-key: []
          x-org-id: []
      description: |-
        Query the API for a list of distinct values for a field
        #### Sample Request
        ```
        curl -X POST 'https://api.jumpcloud.com/insights/directory/v1/events/distinct' -H 'Content-Type: application/json' -H 'x-api-key: REPLACE_KEY_VALUE' --data '{"service": ["all"], "start_time": "2021-07-14T23:00:00Z", "end_time": "2021-07-28T14:00:00Z", "sort": "DESC", "field": "event_type"}'
        ```
      tags:
        - EventDistinctQuery
      summary: Query event distinct field values
      operationId: postInsightsDirectoryV1EventsDistinct
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventDistinctQuery"
        description: JSON event distinct query body
        required: true
      responses:
        "200":
          description: List of distinct field values
          content:
            application/json:
              schema:
                type: object
                properties:
                  buckets:
                    type: array
                    items:
                      type: object
                      properties:
                        doc_count:
                          type: integer
                        key:
                          type: string
                  doc_count_error_upper_bound:
                    type: integer
                  sum_other_doc_count:
                    type: integer
        "400":
          description: Invalid/unknown query JSON body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "401":
          description: Unauthorized (Invalid API Key)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "402":
          description: Directory Insights is not enabled for your organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "500":
          description: Technical difficulties processing your request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
      x-scopes:
        - directoryinsights.readonly
  /v1/events/interval:
    post:
      security:
        - x-api-key: []
          x-org-id: []
      description: |-
        Query the API for a list of counts by time interval
        #### Sample Request
        ```
        curl -X POST 'https://api.jumpcloud.com/insights/directory/v1/events/interval' -H 'Content-Type: application/json' -H 'x-api-key: REPLACE_KEY_VALUE' --data '{"service": ["all"], "start_time": "2021-07-14T23:00:00Z", "end_time": "2021-07-28T14:00:00Z", "timezone": "-0500", "interval_unit": "h", "interval_value": "2"}'
        ```
      tags:
        - EventIntervalQuery
      summary: Query event counts by bucketed by a time interval
      operationId: postInsightsDirectoryV1EventsInterval
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventIntervalQuery"
        description: JSON event interval query body
        required: true
      responses:
        "200":
          description: List of bucketed event counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  buckets:
                    type: array
                    items:
                      type: object
                      properties:
                        doc_count:
                          type: integer
                        key:
                          type: integer
                        key_as_string:
                          type: string
        "400":
          description: Invalid/unknown query JSON body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "401":
          description: Unauthorized (Invalid API Key)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "402":
          description: Directory Insights is not enabled for your organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
        "500":
          description: Technical difficulties processing your request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorMessage"
      x-scopes:
        - directoryinsights.readonly
  /v1/reports:
    get:
      security:
        - x-api-key: []
          x-org-id: []
      description: Ordered list of report metadata
      tags:
        - Reports
      summary: Get a list of report metadata
      operationId: getInsightsDirectoryV1Reports
      parameters:
        - description: Sort type and direction. Default sort is descending, prefix with - to sort ascending.
          name: sort
          in: query
          schema:
            type: string
            enum:
              - CREATED_AT
              - EXPIRATION
              - REQUESTER_EMAIL
              - STATUS
              - TYPE
              - UPDATED_AT
              - -CREATED_AT
              - -EXPIRATION
              - -REQUESTER_EMAIL
              - -STATUS
              - -TYPE
              - -UPDATED_AT
      responses:
        "200":
          description: Array of report metadata
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    artifacts:
                      type: array
                      items:
                        type: object
                        properties:
                          format:

components:
  schemas:
    ErrorMessage:
      type: object
      properties:
        message:
          description: Text detailed error message returned by the service
          type: string
    EventCount:
      description: EventCount JSON struct with count of matching events
      type: object
      properties:
        count:
          type: integer
          format: int64
    EventDistinctQuery:
      description: EventDistinctQuery is the users' command to search our auth logs for distinct values of the specified field
      allOf:
        - $ref: "#/components/schemas/EventServiceTimeQuery"
        - type: object
          required:
            - field
          properties:
            exclude_provider_activity:
              description: When true, exclude provider-level events and return only child organization activity.
              type: boolean
            field:
              description: field is what they wish to query on
              type: string
            search_term:
              $ref: "#/components/schemas/SearchTerm"
    EventIntervalQuery:
      description: EventIntervalQuery is the users' command to search our auth logs for bucketed counts of values of the specified field
      allOf:
        - $ref: "#/components/schemas/EventServiceTimeQuery"
        - type: object
          required:
            - interval_unit
          properties:
            exact_match:
              description: optional string for specifying exact match query, do not use with full text query
              type: string
            exclude_provider_activity:
              description: When true, exclude provider-level events and return only child organization activity.
              type: boolean
            interval_unit:
              type: string
              enum:
                - s
                - m
                - h
                - d
                - w
            interval_value:
              description: Interval Value. This specifies how many units you want to bucket the event counts by
              type: string
            q:
              description: optional string for specifying a full text query
              type: string
            search_term:
              $ref: "#/components/schemas/SearchTerm"
            timezone:
              description: |-
                TimeZone. Specify the timezone in which the user is in
                optional
              type: string
    EventQuery:
      description: EventQuery is the users' command to search our auth logs
      allOf:
        - $ref: "#/components/schemas/EventServiceTimeQuery"
        - type: object
          properties:
            exact_match:
              description: optional string for specifying exact match query, do not use with full text query
              type: string
            exclude_provider_activity:
              description: When true, exclude provider-level events and return only child organization activity.
              type: boolean
            fields:
              description: optional list of fields to return from query
              type: array
              items:
                type: string
            limit:
              description: Max number of rows to return
              type: integer
              format: int64
            q:
              description: optional string for specifying a full text query
              type: string
            search_after:
              description: Specific query to search after, see x-* response headers for next values
              type: array
              items:
                type: object
            search_term:
              $ref: "#/components/schemas/SearchTerm"
            skip:
              description: optional offset into the result set to start with when returning
              type: integer
              format: int64
            sort:
              description: ASC or DESC order for timestamp
              type: string
    EventServiceTimeQuery:
      description: |-
        EventServiceTimeQuery is the base struct for most event queries
        it includes the minimum-required fields of service and start/end times
      type: object
      required:
        - service
        - start_time
      properties:
        end_time:
          description: optional query end time, UTC in RFC3339 format
          type: string
          format: date-time
        service:
          description: service name to query.
          type: array
          items:
            type: string
            enum:
              - alerts
              - all
              - directory
              - ldap
              - mdm
              - notifications
              - object_storage
              - password_manager
              - password_vault
              - radius
              - reports
              - saas_app_management
              - software
              - sso
              - systems
              - access_management
              - asset_management
              - workflows
              - genai
              - aigw
              - ai_admin
              - generic_di
        start_time:
          description: query start time, UTC in RFC3339 format
          type: string
          format: date-time
    SearchTerm:
      description: |-
        SearchTerm is the filter portion of the query
        it contains only one of 'and', 'or', or 'not' conjunction maps
      type: object
      properties:
        and:
          $ref: "#/components/schemas/TermConjunction"
        not:
          $ref: "#/components/schemas/TermConjunction"
        or:
          $ref: "#/components/schemas/TermConjunction"
    TermConjunction:
      description: |-
        TermConjunction represents a conjunction (and/or)
        NOTE: the validator limits what the operator can be, not the object
        for future-proof-ness
        and a list of sub-values
      type: object
  parameters: {}
  responses: {}
  requestBodies:
    EventQuery:
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/EventQuery"
      description: JSON event query body
      required: true
  securitySchemes:
    x-api-key:
      type: apiKey
      name: x-api-key
      in: header
    x-org-id:
      type: apiKey
      name: x-org-id
      in: header
tags:
  - name: EventDistinctQuery
  - name: EventIntervalQuery
  - name: EventQuery
  - name: Reports
x-tagGroups:
  - name: API Reference
    tags:
      - EventDistinctQuery
      - EventIntervalQuery
      - EventQuery
      - Reports
x-scopes:
  - directoryinsights.readonly

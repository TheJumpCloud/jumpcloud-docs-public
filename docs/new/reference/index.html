    <script>
    (function () {
      function syncDocsChromeOffset() {
        var nav = document.querySelector("body.jc-docs-landing > nav.sticky-top");
        if (!nav) {
          return;
        }
        document.documentElement.style.setProperty(
          "--jc-docs-chrome-offset",
          nav.offsetHeight + "px"
        );
        var footer = document.querySelector("body.jc-scalar-docs-body .jc-circuit-landing-footer");
        if (footer) {
          document.documentElement.style.setProperty(
            "--jc-scalar-footer-height",
            footer.offsetHeight + "px"
          );
        }
        if (window.JumpCloudDocs && typeof JumpCloudDocs.syncScalarViewportHeight === "function") {
          JumpCloudDocs.syncScalarViewportHeight();
        }
      }

      function init() {
        syncDocsChromeOffset();
        if (typeof ResizeObserver !== "undefined") {
          var nav = document.querySelector("body.jc-docs-landing > nav.sticky-top");
          if (nav) {
            new ResizeObserver(syncDocsChromeOffset).observe(nav);
          }
          var footer = document.querySelector("body.jc-scalar-docs-body .jc-circuit-landing-footer");
          if (footer) {
            new ResizeObserver(syncDocsChromeOffset).observe(footer);
          }
        }
      }

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", init);
      } else {
        init();
      }
      window.addEventListener("resize", syncDocsChromeOffset);
    })();
  </script>
